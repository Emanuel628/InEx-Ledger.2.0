<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>InEx Ledger - Forgot Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="/css/pages/login.css">
</head>
<body>
  <a href="#main-content" class="skip-link" data-i18n="a11y_skip_to_main">Skip to main content</a>
  <header class="marketing-header auth-header">
    <a class="brand" href="/" aria-label="InEx Ledger home">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <rect x="2" y="2" width="5" height="5" rx="1.5" fill="currentColor" opacity="1"></rect>
          <rect x="9" y="2" width="5" height="5" rx="1.5" fill="currentColor" opacity=".6"></rect>
          <rect x="2" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".6"></rect>
          <rect x="9" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".35"></rect>
        </svg>
      </span>
      <span class="brand-text">InEx Ledger</span>
    </a>
    <nav>
      <a href="/login" data-i18n="nav_sign_in">Sign in</a>
      <a href="/subscription" data-i18n="nav_pricing">Pricing</a>
    </nav>
  </header>
  <main id="main-content">
    <section class="auth-card">
      <h2 data-i18n="forgot_password_title">Forgot your password?</h2>
      <form id="forgotPasswordForm" method="post" class="auth-form">
        <div class="form-field">
          <label for="email" data-i18n="forgot_password_email_label">Email address</label>
          <input type="email" name="email" id="email" required autocomplete="email" />
        </div>
        <button type="submit" class="auth-submit" data-i18n="forgot_password_submit">Send reset link</button>
      </form>
      <p id="forgotPasswordStatus" class="auth-error" aria-live="polite" hidden></p>
      <p id="forgotPasswordLink" class="forgot-password auth-helper" hidden></p>
      <p class="forgot-password auth-helper" data-i18n="forgot_password_help">
        Enter the email tied to your account and we will send a reset link if it exists.
      </p>
      <p class="forgot-password">
        <a href="login" data-i18n="forgot_password_back">Back to sign in</a>
      </p>
    </section>
  </main>
  <footer>
    <p>
      <a href="/subscription" data-i18n="nav_pricing">Pricing</a>
      <a href="/privacy" data-i18n="footer_privacy">Privacy</a>
      <a href="/terms" data-i18n="footer_terms">Terms</a>
    </p>
    <p>&copy; 2026 InEx Ledger</p>
  </footer>
  <script src="../js/global.js?v=20260405c"></script>
  <script src="../js/i18n.js?v=20260405c"></script>
  <script src="../js/forgot-password.js?v=20260405c"></script>
</body>
</html>

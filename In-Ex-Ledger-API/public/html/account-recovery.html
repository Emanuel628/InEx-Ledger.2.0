<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>InEx Ledger - Account Recovery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="/css/pages/login.css">
</head>
<body>
  <a href="#main-content" class="skip-link" data-i18n="a11y_skip_to_main">Skip to main content</a>
  <header class="marketing-header auth-header">
    <a class="brand" href="/" aria-label="InEx Ledger home">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <rect x="2" y="2" width="5" height="5" rx="1.5" fill="currentColor" opacity="1"></rect>
          <rect x="9" y="2" width="5" height="5" rx="1.5" fill="currentColor" opacity=".6"></rect>
          <rect x="2" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".6"></rect>
          <rect x="9" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".35"></rect>
        </svg>
      </span>
      <span class="brand-text">InEx Ledger</span>
    </a>
  </header>
  <main id="main-content">
    <section class="auth-card">
      <h2>Account recovery</h2>
      <p class="auth-helper">Use the separate recovery email on file to send yourself a password reset link.</p>
      <form id="accountRecoveryForm" class="auth-form">
        <div class="form-field">
          <label for="accountRecoveryEmail">Account email</label>
          <input type="email" id="accountRecoveryEmail" name="email" required autocomplete="email" />
        </div>
        <div class="form-field">
          <label for="accountRecoveryBackupEmail">Recovery email</label>
          <input type="email" id="accountRecoveryBackupEmail" name="recoveryEmail" required autocomplete="email" />
        </div>
        <button type="submit" class="auth-submit">Send recovery link</button>
      </form>
      <p id="accountRecoveryStatus" class="auth-error" aria-live="polite" hidden></p>
      <p class="forgot-password auth-helper">If the account and recovery email match, we will send a reset link to the recovery inbox.</p>
      <p class="forgot-password">
        <a href="/login">Back to sign in</a>
      </p>
    </section>
  </main>
  <script src="../js/escape-html.js?v=20260410a"></script>
  <script src="../js/global.js?v=20260423a"></script>
  <script src="../js/i18n.js?v=20260405c"></script>
  <script src="../js/account-recovery.js?v=20260423a"></script>
</body>
</html>

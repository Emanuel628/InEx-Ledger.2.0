<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>InEx Ledger - Verify sign-in</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="Enter your InEx Ledger verification code to complete sign-in on this device."
  />
  <link rel="canonical" href="https://www.inexledger.com/mfa-challenge" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/css/app.css?v=20260510c">
  <link rel="stylesheet" href="/css/pages/login.css?v=20260503f">
</head>
<body>
  <a href="#main-content" class="skip-link" data-i18n="a11y_skip_to_main">Skip to main content</a>
  <header class="marketing-header auth-header">
    <a class="brand" href="/" aria-label="InEx Ledger home">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <rect x="2" y="2" width="5" height="5" rx="1.5" fill="currentColor" opacity="1"></rect>
          <rect x="9" y="2" width="5" height="5" rx="1.5" fill="currentColor" opacity=".6"></rect>
          <rect x="2" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".6"></rect>
          <rect x="9" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".35"></rect>
        </svg>
      </span>
      <span class="brand-text">InEx Ledger</span>
    </a>
  </header>

  <main id="main-content">
    <section class="auth-card">
      <h1 data-i18n="mfa_challenge_title">Verify sign-in</h1>
      <p id="mfaChallengeIntro" class="auth-helper">
        Enter the 6-digit code we emailed you to finish signing in.
      </p>

      <form id="mfaChallengeForm" class="auth-form">
        <div class="form-field">
          <label for="mfaChallengeCode" data-i18n="mfa_challenge_code_label">Email verification code</label>
          <input
            type="text"
            id="mfaChallengeCode"
            name="mfaChallengeCode"
            inputmode="numeric"
            autocomplete="one-time-code"
            maxlength="6"
            pattern="[0-9]{6}"
            placeholder="123456"
            required
          />
        </div>

        <label class="auth-checkbox">
          <input type="checkbox" id="mfaTrustDevice" />
          <span>Trust this device for this account</span>
        </label>
        <p class="auth-helper">
          You may need to verify again when signing into a different InEx Ledger account on this device.
        </p>

        <button type="submit" class="auth-submit" data-i18n="mfa_challenge_submit">Verify and continue</button>
        <button type="button" id="mfaChallengeBack" class="auth-secondary-btn" data-i18n="mfa_challenge_back">Back to sign in</button>
      </form>
      <p class="auth-helper">
        <button type="button" id="mfaChallengeResend" class="auth-text-link" data-i18n="mfa_challenge_resend">Resend verification code</button>
      </p>
      <p id="mfaChallengeError" class="auth-error" role="alert" aria-live="polite" hidden></p>
    </section>
  </main>

  <script src="../js/escape-html.js?v=20260506a"></script>
<script src="../js/global.js?v=20260510c"></script>
  <script src="../js/i18n.js?v=20260510c"></script>
  <script src="../js/auth.js?v=20260510b"></script>
  <script src="../js/mfa-challenge.js?v=20260516a"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>InEx Ledger - Getting Started</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/css/app.css" />
  <link rel="stylesheet" href="/css/pages/onboarding.css" />
</head>
<body>
  <header class="marketing-header auth-header">
    <a class="brand" href="/" aria-label="InEx Ledger home">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <rect x="2" y="2" width="5" height="5" rx="1.5" fill="currentColor" opacity="1"></rect>
          <rect x="9" y="2" width="5" height="5" rx="1.5" fill="currentColor" opacity=".6"></rect>
          <rect x="2" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".6"></rect>
          <rect x="9" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".35"></rect>
        </svg>
      </span>
      <span class="brand-text">InEx Ledger</span>
    </a>
  </header>

  <main class="onboarding-main">
    <section class="onboarding-shell">
      <div class="onboarding-intro">
        <span class="onboarding-kicker">Get set up</span>
        <h1>Let’s make your workspace usable in one pass.</h1>
        <p>Tell us the basics, we’ll set your defaults, create your first account, and point you to the right starting page.</p>
        <ol class="onboarding-steps">
          <li>Business basics</li>
          <li>Regional defaults</li>
          <li>First account</li>
          <li>Your starting workflow</li>
        </ol>
      </div>

      <form id="onboardingForm" class="onboarding-card">
        <div class="onboarding-grid">
          <div class="form-field">
            <label for="onboardingBusinessName">Business name</label>
            <input type="text" id="onboardingBusinessName" autocomplete="organization" required />
          </div>
          <div class="form-field">
            <label for="onboardingBusinessType">Business type</label>
            <select id="onboardingBusinessType" required>
              <option value="sole_proprietor">Sole proprietor</option>
              <option value="llc">LLC</option>
              <option value="s_corp">S-Corp</option>
              <option value="partnership">Partnership</option>
            </select>
          </div>
          <div class="form-field">
            <label for="onboardingRegion">Region</label>
            <select id="onboardingRegion" required>
              <option value="US">United States</option>
              <option value="CA">Canada</option>
            </select>
          </div>
          <div class="form-field" id="onboardingProvinceField" hidden>
            <label for="onboardingProvince">Province</label>
            <select id="onboardingProvince">
              <option value="">Choose a province</option>
              <option value="AB">Alberta</option>
              <option value="BC">British Columbia</option>
              <option value="MB">Manitoba</option>
              <option value="NB">New Brunswick</option>
              <option value="NL">Newfoundland and Labrador</option>
              <option value="NS">Nova Scotia</option>
              <option value="NT">Northwest Territories</option>
              <option value="NU">Nunavut</option>
              <option value="ON">Ontario</option>
              <option value="PE">Prince Edward Island</option>
              <option value="QC">Quebec</option>
              <option value="SK">Saskatchewan</option>
              <option value="YT">Yukon</option>
            </select>
          </div>
          <div class="form-field">
            <label for="onboardingLanguage">Language</label>
            <select id="onboardingLanguage" data-language-select required></select>
          </div>
          <div class="form-field">
            <label for="onboardingStarterAccountType">First account type</label>
            <select id="onboardingStarterAccountType" required>
              <option value="checking">Checking</option>
              <option value="savings">Savings</option>
              <option value="credit_card">Credit card</option>
              <option value="cash">Cash</option>
              <option value="loan">Loan</option>
            </select>
          </div>
          <div class="form-field">
            <label for="onboardingStarterAccountName">First account name</label>
            <input type="text" id="onboardingStarterAccountName" required />
          </div>
          <div class="form-field form-field-full">
            <label for="onboardingStartFocus">What do you want to do first?</label>
            <select id="onboardingStartFocus" required>
              <option value="transactions">Start logging transactions</option>
              <option value="receipts">Upload receipts</option>
              <option value="mileage">Track mileage</option>
              <option value="exports">Review exports</option>
            </select>
          </div>
        </div>

        <p id="onboardingMessage" class="auth-error" role="alert" aria-live="polite" hidden></p>

        <div class="onboarding-actions">
          <button type="submit" class="auth-submit">Save and continue</button>
        </div>
      </form>
    </section>
  </main>

  <script src="../js/global.js?v=20260405c"></script>
  <script src="../js/i18n.js?v=20260405c"></script>
  <script src="../js/auth.js?v=20260405c"></script>
  <script src="../js/onboarding-page.js?v=20260405c"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>InEx Ledger - Create Account</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="/css/app.css">
<link rel="stylesheet" href="/css/pages/register.css">
</head>

<body>
  <header class="marketing-header auth-header">
    <a class="brand" href="/" aria-label="InEx Ledger home">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <rect x="2" y="2" width="5" height="5" rx="1.5" fill="currentColor" opacity="1"></rect>
          <rect x="9" y="2" width="5" height="5" rx="1.5" fill="currentColor" opacity=".6"></rect>
          <rect x="2" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".6"></rect>
          <rect x="9" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".35"></rect>
        </svg>
      </span>
      <span class="brand-text">InEx Ledger</span>
    </a>
  </header>

  <main>
    <section class="auth-card">
      <h2 data-i18n="register_title">Create your account</h2>

      <form id="registerForm" method="post" class="auth-form">
        <div class="form-field">
          <label for="email" data-i18n="register_email_label">Email address</label>
          <input type="email" id="email" name="email" required autocomplete="email" />
        </div>

        <div class="form-field">
          <label for="password" data-i18n="register_password_label">Password</label>
          <input type="password" id="password" name="password" required autocomplete="new-password" aria-describedby="passwordStrengthText" />
        </div>

        <div class="form-field">
          <label for="confirm-password" data-i18n="register_confirm_password_label">Confirm password</label>
          <input
            type="password"
            id="confirm-password"
            name="confirm_password"
            required
            autocomplete="new-password"
            aria-describedby="passwordMatchMessage"
          />
        </div>

        <p id="passwordMatchMessage" class="password-match-message"></p>

        <div class="password-meter-row">
          <div class="password-meter" aria-hidden="true">
            <div class="meter-segment" data-segment="1"></div>
            <div class="meter-segment" data-segment="2"></div>
            <div class="meter-segment" data-segment="3"></div>
          </div>
          <p id="passwordStrengthText" class="password-strength-text"></p>
        </div>

        <ul class="password-requirements" aria-label="Password requirements">
          <li data-requirement="length" data-i18n="settings_password_rule_length">At least 8 characters</li>
          <li data-requirement="uppercase" data-i18n="settings_password_rule_uppercase">Includes an uppercase letter</li>
          <li data-requirement="number" data-i18n="settings_password_rule_number">Includes a number</li>
          <li data-requirement="special" data-i18n="settings_password_rule_special">Includes a symbol</li>
        </ul>

        <label class="show-password-toggle show-password-switch">
          <input type="checkbox" id="togglePassword" />
          <span data-i18n="register_show_password">Show password</span>
        </label>

        <div class="language-field form-field">
          <label for="languageSelectRegister" data-i18n="register_language_label">Language</label>
          <select id="languageSelectRegister" name="language" data-language-select></select>
        </div>

        <div class="form-field">
          <label for="countrySelectRegister" data-i18n="register_country_label">Country</label>
          <select id="countrySelectRegister" name="country">
            <option value="US" data-i18n="register_country_us">United States</option>
            <option value="CA" data-i18n="register_country_ca">Canada</option>
          </select>
        </div>

        <div class="form-field" id="provinceField" hidden>
          <label for="provinceSelectRegister" data-i18n="register_province_label">Province</label>
          <select id="provinceSelectRegister" name="province">
            <option value="" data-i18n="register_province_placeholder">Select province</option>
            <option value="AB">Alberta</option>
            <option value="BC">British Columbia</option>
            <option value="MB">Manitoba</option>
            <option value="NB">New Brunswick</option>
            <option value="NL">Newfoundland and Labrador</option>
            <option value="NS">Nova Scotia</option>
            <option value="NT">Northwest Territories</option>
            <option value="NU">Nunavut</option>
            <option value="ON">Ontario</option>
            <option value="PE">Prince Edward Island</option>
            <option value="QC">Quebec</option>
            <option value="SK">Saskatchewan</option>
            <option value="YT">Yukon</option>
          </select>
        </div>

        <div class="consent-field">
          <input type="checkbox" id="tosConsent" class="consent-checkbox" />
          <label for="tosConsent">
            <span data-i18n="register_consent_prefix">I agree to the </span>
            <a href="terms" data-i18n="register_consent_terms">Terms</a>
            <span data-i18n="register_consent_and"> and </span>
            <a href="privacy" data-i18n="register_consent_privacy">Privacy Policy</a>
            <span data-i18n="register_consent_suffix">.</span>
          </label>
        </div>

        <p class="consent-required-hint" data-i18n="register_consent_required">Required: You must accept the Terms and Privacy Policy.</p>

        <p id="tosConsentMessage" class="consent-error" aria-live="polite"></p>

        <p id="registerError" class="auth-error" role="alert" aria-live="polite" hidden></p>

        <button type="submit" class="auth-submit" data-i18n="register_submit">Create account</button>
      </form>

        <p>
          <span data-i18n="register_existing_account">Already have an account?</span>
          <a href="login" data-i18n="register_sign_in">Sign in</a>
        </p>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 InEx Ledger</p>
  </footer>
<script src="../js/global.js?v=20260405c"></script>
<script src="../js/i18n.js?v=20260405c"></script>
<script src="../js/auth.js?v=20260405c"></script>
<script src="../js/privacyService.js?v=20260405c"></script>
<script src="../js/register.js?v=20260405c"></script>
</body>
</html>

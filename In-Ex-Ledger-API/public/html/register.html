<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>InEx Ledger - Create Account</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="/css/app.css">
<link rel="stylesheet" href="/css/pages/register.css">
</head>

<body>
  <header class="marketing-header auth-header">
    <a class="brand" href="/" aria-label="InEx Ledger home">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <rect x="2" y="2" width="5" height="5" rx="1.5" fill="currentColor" opacity="1"></rect>
          <rect x="9" y="2" width="5" height="5" rx="1.5" fill="currentColor" opacity=".6"></rect>
          <rect x="2" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".6"></rect>
          <rect x="9" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".35"></rect>
        </svg>
      </span>
      <span class="brand-text">InEx Ledger</span>
    </a>
    <nav>
      <a href="/login">Sign in</a>
      <a href="/subscription">Pricing</a>
    </nav>
  </header>

  <main>
    <section class="auth-card">
      <h2 data-i18n="register_title">Create your account</h2>

      <form id="registerForm" method="post" class="auth-form">
        <div class="form-field">
          <label for="email" data-i18n="register_email_label">Email address</label>
          <input type="email" id="email" name="email" required autocomplete="email" />
        </div>

        <div class="form-field">
          <label for="password" data-i18n="register_password_label">Password</label>
          <input type="password" id="password" name="password" required autocomplete="new-password" />
          <div class="password-meter" aria-hidden="true">
            <div class="meter-segment" data-segment="1"></div>
            <div class="meter-segment" data-segment="2"></div>
            <div class="meter-segment" data-segment="3"></div>
          </div>
          <p id="passwordStrengthText" class="password-strength-text">Weak</p>
        </div>

        <div class="form-field">
          <label for="confirm-password" data-i18n="register_confirm_password_label">Confirm password</label>
          <input
            type="password"
            id="confirm-password"
            name="confirm_password"
            required
            autocomplete="new-password"
          />
        </div>

        <p id="passwordMatchMessage" class="password-match-message"></p>

        <label class="show-password-toggle show-password-switch" data-i18n="register_show_password">
          <input type="checkbox" id="togglePassword" />
          Show password
        </label>

        <div class="language-field form-field">
          <label for="languageSelectRegister" data-i18n="register_language_label">Language</label>
          <select id="languageSelectRegister" name="language" data-language-select></select>
        </div>

        <div class="consent-field">
          <input type="checkbox" id="tosConsent" class="consent-checkbox" />
          <label for="tosConsent">
            <span data-i18n="register_consent_prefix">I agree to the </span>
            <a href="terms" data-i18n="register_consent_terms">Terms</a>
            <span data-i18n="register_consent_and"> and </span>
            <a href="privacy" data-i18n="register_consent_privacy">Privacy Policy</a>
            <span data-i18n="register_consent_suffix">.</span>
          </label>
        </div>

        <p id="tosConsentMessage" class="consent-error" aria-live="polite"></p>

        <p id="registerError" class="auth-error" role="alert" aria-live="polite" hidden></p>

        <button type="submit" class="auth-submit" data-i18n="register_submit">Create account</button>
      </form>

        <p>
          <span data-i18n="register_existing_account">Already have an account?</span>
          <a href="login" data-i18n="register_sign_in">Sign in</a>
        </p>
    </section>
  </main>

  <footer>
    <p>
      <a href="subscription" data-i18n="nav_pricing">Pricing</a>
      <a href="privacy">Privacy</a>
      <a href="terms">Terms</a>
    </p>
    <p>&copy; 2026 InEx Ledger</p>
  </footer>
<script src="../js/global.js"></script>
<script src="../js/i18n.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/privacyService.js"></script>
<script src="../js/register.js"></script>
</body>
</html>

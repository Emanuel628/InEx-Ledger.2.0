<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>InEx Ledger — Change Email</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="/css/app.css">
<link rel="stylesheet" href="/css/pages/login.css">
</head>
<body>
  <header class="marketing-header auth-header">
    <a class="brand" href="/transactions" aria-label="InEx Ledger home">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <rect x="2" y="2" width="5" height="5" rx="1.5" fill="currentColor" opacity="1"></rect>
          <rect x="9" y="2" width="5" height="5" rx="1.5" fill="currentColor" opacity=".6"></rect>
          <rect x="2" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".6"></rect>
          <rect x="9" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".35"></rect>
        </svg>
      </span>
      <span class="brand-text">InEx Ledger</span>
    </a>
    <nav>
      <a href="/transactions">Transactions</a>
      <a href="/settings#settings-security">Security</a>
    </nav>
  </header>
  <main>
    <section class="auth-card">
      <h2>Change email</h2>
      <form id="changeEmailForm" method="post" class="auth-form">
        <div class="form-field">
          <label for="newEmail">New email address</label>
          <input type="email" id="newEmail" name="newEmail" required autocomplete="email" />
        </div>
        <div class="form-field">
          <label for="currentPassword">Current password</label>
          <input type="password" id="currentPassword" name="currentPassword" required autocomplete="current-password" />
        </div>
        <button type="submit" class="auth-submit">Send confirmation email</button>
      </form>
      <p id="changeEmailStatus" class="auth-error" aria-live="polite" hidden></p>
      <p class="auth-helper">
        We will send a confirmation link to the new address. Your email will not change until you click it.
      </p>
      <p class="forgot-password">
        <a href="/settings#settings-security">Back to security settings</a>
      </p>
    </section>
  </main>
  <footer>
    <p>
      <a href="/subscription">Pricing</a>
      <a href="/privacy">Privacy</a>
      <a href="/terms">Terms</a>
    </p>
    <p>&copy; 2026 InEx Ledger</p>
  </footer>
<script src="../js/global.js?v=20260405c"></script>
<script src="../js/i18n.js?v=20260405c"></script>
<script src="../js/auth.js?v=20260405c"></script>
<script src="../js/change-email.js?v=20260405c"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>InEx Ledger &mdash; Change Email</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="/css/app.css?v=20260508a">
<link rel="stylesheet" href="/css/pages/login.css">
</head>
<body>
  <a href="#main-content" class="skip-link" data-i18n="a11y_skip_to_main">Skip to main content</a>
  <header class="marketing-header auth-header">
    <a class="brand" href="/transactions" aria-label="InEx Ledger home">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <rect x="2" y="2" width="5" height="5" rx="1.5" fill="currentColor" opacity="1"></rect>
          <rect x="9" y="2" width="5" height="5" rx="1.5" fill="currentColor" opacity=".6"></rect>
          <rect x="2" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".6"></rect>
          <rect x="9" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".35"></rect>
        </svg>
      </span>
      <span class="brand-text">InEx Ledger</span>
    </a>
    <nav>
      <a href="/transactions" data-i18n="nav_transactions">Transactions</a>
      <a href="/settings#settings-security" data-i18n="settings_nav_security">Security</a>
    </nav>
  </header>
  <main id="main-content">
    <section class="auth-card">
      <h2 data-i18n="change_email_title">Change email</h2>
      <form id="changeEmailForm" method="post" class="auth-form">
        <div class="form-field">
          <label for="newEmail" data-i18n="change_email_new_label">New email address</label>
          <input type="email" id="newEmail" name="newEmail" required autocomplete="email" />
        </div>
        <div class="form-field">
          <label for="currentPassword" data-i18n="settings_current_password">Current password</label>
          <input type="password" id="currentPassword" name="currentPassword" required autocomplete="current-password" />
        </div>
        <button type="submit" class="auth-submit" data-i18n="change_email_submit">Send confirmation email</button>
      </form>
      <p id="changeEmailStatus" class="auth-error" aria-live="polite" hidden></p>
      <p class="auth-helper" data-i18n="change_email_help">
        We will send a confirmation link to your current email address to protect the account. Your email will not change until you approve it.
      </p>
      <p class="forgot-password">
        <a href="/settings#settings-security" data-i18n="change_email_back">Back to security settings</a>
      </p>
    </section>
  </main>
  <footer>
    <p>
      <a href="/subscription" data-i18n="nav_pricing">Pricing</a>
      <a href="/privacy" data-i18n="footer_privacy">Privacy</a>
      <a href="/terms" data-i18n="footer_terms">Terms</a>
    </p>
    <p>&copy; 2026 InEx Ledger</p>
  </footer>
<script src="../js/escape-html.js?v=20260410a"></script>
<script src="../js/global.js?v=20260507a"></script>
<script src="../js/i18n.js?v=20260405c"></script>
<script src="../js/auth.js?v=20260510b"></script>
<script src="../js/change-email.js?v=20260405c"></script>
</body>
</html>

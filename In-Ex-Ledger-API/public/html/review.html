<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>InEx Ledger - Redirecting Review</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <meta http-equiv="refresh" content="0;url=/exports?focus=review#exportReviewQueueSection" />
  <link rel="stylesheet" href="/css/app.css?v=20260615c" />
</head>
<body>
  <main class="app-page" style="max-width:720px;margin:0 auto;padding:64px 24px;">
    <div class="app-page-kicker">Review moved</div>
    <h1 class="app-page-title">Review now lives in Exports.</h1>
    <p class="app-page-subtitle">Redirecting to the export review queue so cleanup stays in the same handoff workflow.</p>
    <p><a href="/exports?focus=review#exportReviewQueueSection">Continue to Exports review</a></p>
  </main>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      params.set("focus", "review");
      const next = `/exports?${params.toString()}#exportReviewQueueSection`;
      window.location.replace(next);
    })();
  </script>
</body>
</html>

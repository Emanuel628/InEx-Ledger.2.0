<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>InEx Ledger — Reset Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="/css/app.css">
<link rel="stylesheet" href="/css/pages/login.css">
</head>
<body>
  <header class="marketing-header auth-header">
    <a class="brand" href="/" aria-label="InEx Ledger home">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <rect x="2" y="2" width="5" height="5" rx="1.5" fill="currentColor" opacity="1"></rect>
          <rect x="9" y="2" width="5" height="5" rx="1.5" fill="currentColor" opacity=".6"></rect>
          <rect x="2" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".6"></rect>
          <rect x="9" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".35"></rect>
        </svg>
      </span>
      <span class="brand-text">InEx Ledger</span>
    </a>
    <nav>
      <a href="/login">Sign in</a>
      <a href="/subscription">Pricing</a>
    </nav>
  </header>
  <main>
    <section class="auth-card">
      <h2>Reset password</h2>
      <form id="resetPasswordForm" method="post" class="auth-form">
        <div class="form-field">
          <label for="password">New password</label>
          <input type="password" id="password" name="password" required autocomplete="new-password" />
        </div>
        <div class="form-field">
          <label for="confirmPassword">Confirm password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" required autocomplete="new-password" />
        </div>
        <button type="submit" class="auth-submit">Reset password</button>
      </form>
      <p id="resetPasswordStatus" class="auth-error" aria-live="polite" hidden></p>
      <p class="auth-helper">
        Enter a new password for your account. The reset link in your email only works once.
      </p>
      <p class="forgot-password">
        <a href="/login">Back to sign in</a>
      </p>
    </section>
  </main>
<footer>
  <p>
    <a href="/subscription">Pricing</a>
    <a href="/privacy">Privacy</a>
    <a href="/terms">Terms</a>
  </p>
  <p>&copy; 2026 InEx Ledger</p>
</footer>

<script src="../js/global.js?v=20260405c"></script>
<script src="../js/reset-password.js?v=20260405c"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>InEx Ledger - Choose New Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/css/app.css?v=20260510c" />
  <link rel="stylesheet" href="/css/pages/login.css?v=20260514a" />
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <header class="marketing-header auth-header">
    <a class="brand" href="/" aria-label="InEx Ledger home">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <rect x="2" y="2" width="5" height="5" rx="1.5" fill="currentColor" opacity="1"></rect>
          <rect x="9" y="2" width="5" height="5" rx="1.5" fill="currentColor" opacity=".6"></rect>
          <rect x="2" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".6"></rect>
          <rect x="9" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".35"></rect>
        </svg>
      </span>
      <span class="brand-text">InEx Ledger</span>
    </a>
  </header>

  <main id="main-content">
    <section class="auth-card">
      <div class="auth-trust-panel" aria-label="Choose a new password">
        <div class="auth-trust-kicker">Choose a new password</div>
        <p class="auth-trust-copy">Use at least 8 characters, with an uppercase letter, number, and symbol.</p>
      </div>
      <h2>Reset password</h2>
      <p class="auth-page-intro">If the link has expired, request a new one from the forgot password page.</p>

      <form id="resetPasswordForm" class="auth-form" novalidate>
        <div class="form-field">
          <label for="password">New password</label>
          <input type="password" id="password" name="password" required autocomplete="new-password" class="form-control" />
        </div>
        <div class="form-field">
          <label for="confirmPassword">Confirm new password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" required autocomplete="new-password" class="form-control" />
        </div>
        <label class="show-password-toggle">
          <input type="checkbox" id="showResetPasswords" />
          <span>Show passwords</span>
        </label>
        <button type="submit" class="auth-submit">Update password</button>
      </form>

      <p id="resetPasswordMessage" class="auth-error" role="alert" aria-live="polite" hidden></p>

      <p class="auth-switch">
        <a href="/login">Back to sign in</a>
      </p>
    </section>
  </main>

  <footer>
    <p>
      <a href="/privacy">Privacy</a>
      <a href="/terms">Terms</a>
    </p>
    <p>&copy; 2026 InEx Ledger</p>
  </footer>

  <script src="../js/global.js?v=20260514b"></script>
  <script src="../js/auth.js?v=20260514a"></script>
  <script src="../js/reset-password.js?v=20260516a"></script>
</body>
</html>

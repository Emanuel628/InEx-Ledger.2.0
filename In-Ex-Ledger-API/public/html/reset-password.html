<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>InEx Ledger — Reset Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/reset-password.css">
</head>
<body>
  <header><h1>InEx Ledger</h1></header>
  <main>
    <h2>Reset password</h2>
    <form id="resetPasswordForm" method="post">
      <label for="password">New password</label><br />
      <input type="password" name="password" id="password" required autocomplete="new-password" /><br /><br />
      <label for="confirmPassword">Confirm password</label><br />
      <input type="password" name="confirmPassword" id="confirmPassword" required autocomplete="new-password" /><br /><br />
      <button type="submit">Reset password</button>
    </form>
    <p id="resetPasswordStatus" class="form-note" aria-live="polite" hidden></p>
    <p class="form-note">
      Didn’t receive a link? <a href="forgot-password.html">Request another</a>.
    </p>
  </main>
<script src="../js/global.js"></script>
<script src="../js/reset-password.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>InEx Ledger - Accounts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/css/app.css" />
  <link rel="stylesheet" href="/css/pages/accounts.css" />
</head>
<body>
  <a href="#main-content" class="skip-link" data-i18n="a11y_skip_to_main">Skip to main content</a>

  <header class="app-topbar accounts-topbar">
    <div class="topbar-left">
      <a class="topbar-brand" href="transactions" aria-label="InEx Ledger home">
        <span class="brand-mark brand-mark-topbar" aria-hidden="true">
          <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <rect x="2" y="2" width="5" height="5" rx="1.5" fill="currentColor" opacity="1"></rect>
            <rect x="9" y="2" width="5" height="5" rx="1.5" fill="currentColor" opacity=".6"></rect>
            <rect x="2" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".6"></rect>
            <rect x="9" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".35"></rect>
          </svg>
        </span>
        <span class="topbar-brand-text">InEx Ledger</span>
      </a>
      <nav class="topbar-nav" aria-label="Primary">
        <a href="transactions"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="2"></rect><line x1="5" y1="6" x2="11" y2="6"></line><line x1="5" y1="9" x2="9" y2="9"></line></svg></span><span data-i18n="nav_transactions">Transactions</span></a>
        <a class="is-active" href="accounts"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 16 16" fill="none"><rect x="2" y="4" width="12" height="9" rx="1.5"></rect><path d="M5 4V3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1"></path></svg></span><span data-i18n="nav_accounts">Accounts</span></a>
        <a href="categories"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5.5"></circle><path d="M8 5v3l2 1.5"></path></svg></span><span data-i18n="nav_categories">Categories</span></a>
        <a href="receipts"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 16 16" fill="none"><rect x="3" y="2" width="10" height="12" rx="1.5"></rect><path d="M6 5h4M6 8h4M6 11h2"></path></svg></span><span data-i18n="nav_receipts">Receipts</span></a>
        <a href="mileage"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2"></circle><path d="M8 2v2M8 12v2M2 8h2M12 8h2"></path></svg></span><span data-i18n="nav_mileage">Mileage</span></a>
        <a href="exports"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 16 16" fill="none"><path d="M3 10l3-4 2 2 3-4 3 4"></path><rect x="2" y="2" width="12" height="12" rx="2"></rect></svg></span><span data-i18n="nav_exports">Exports</span></a>
        <a href="settings"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2"></circle><path d="M8 2v2M8 12v2M2 8h2M12 8h2M3.5 3.5l1.5 1.5M11 11l1.5 1.5M3.5 12.5L5 11M11 5l1.5-1.5"></path></svg></span><span data-i18n="nav_settings">Settings</span></a>
      </nav>
    </div>
    <div class="user-pill">
      <span class="user-avatar">U</span>
      <span class="user-name">InEx Ledger</span>
    </div>
  </header>

  <main id="main-content" class="app-shell">
    <aside class="app-sidebar" aria-label="Sidebar">
      <div class="sidebar-section-label" data-i18n="sidebar_overview">Overview</div>
      <nav class="sidebar-nav">
        <a href="transactions" class="sidebar-link"><span class="sidebar-icon" aria-hidden="true"><svg viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="2"></rect><line x1="5" y1="6" x2="11" y2="6"></line><line x1="5" y1="9" x2="9" y2="9"></line></svg></span><span data-i18n="sidebar_all_transactions">All transactions</span></a>
        <a href="transactions?type=income" class="sidebar-link"><span class="sidebar-icon" aria-hidden="true"><svg viewBox="0 0 16 16" fill="none"><path d="M8 11V5M5 8l3-3 3 3"></path></svg></span><span data-i18n="sidebar_income">Income</span></a>
        <a href="transactions?type=expense" class="sidebar-link"><span class="sidebar-icon" aria-hidden="true"><svg viewBox="0 0 16 16" fill="none"><path d="M8 5v6M5 8l3 3 3-3"></path></svg></span><span data-i18n="sidebar_expenses">Expenses</span></a>
      </nav>
      <div class="sidebar-section-label" data-i18n="sidebar_tools">Tools</div>
      <nav class="sidebar-nav">
        <a href="receipts" class="sidebar-link"><span class="sidebar-icon" aria-hidden="true"><svg viewBox="0 0 16 16" fill="none"><rect x="3" y="2" width="10" height="12" rx="1.5"></rect><path d="M6 5h4M6 8h4M6 11h2"></path></svg></span><span data-i18n="nav_receipts">Receipts</span><span id="receiptsDot" class="sidebar-dot" hidden></span></a>
        <a href="mileage" class="sidebar-link"><span class="sidebar-icon" aria-hidden="true"><svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2"></circle><path d="M8 2v2M8 12v2M2 8h2M12 8h2"></path></svg></span><span data-i18n="nav_mileage">Mileage</span></a>
        <a href="exports" class="sidebar-link"><span class="sidebar-icon" aria-hidden="true"><svg viewBox="0 0 16 16" fill="none"><path d="M3 10l3-4 2 2 3-4 3 4"></path><rect x="2" y="2" width="12" height="12" rx="2"></rect></svg></span><span data-i18n="nav_exports">Exports</span></a>
      </nav>

      <!-- Business (V2) sidebar intentionally omitted on V1 pages -->
    </aside>

    <div class="app-content accounts-content">
      <section class="accounts-page-header">
        <div>
          <h1 class="accounts-page-title" data-i18n="accounts_title">Accounts</h1>
          <p class="accounts-page-subtitle" data-i18n="accounts_page_subtitle">Manage your business bank accounts, credit cards, and cash.</p>
        </div>
        <button id="showAccountForm" type="button" class="accounts-add-btn" data-i18n="accounts_add">Add account</button>
      </section>

      <section id="accountFormContainer" class="account-form-card" hidden>
        <form id="accountForm" class="account-form">
          <div class="form-field">
            <label class="field-label" for="account-name" data-i18n="accounts_label_name">Account name</label>
            <input type="text" id="account-name" name="account-name" required class="form-control" />
          </div>
          <div class="form-field">
            <label class="field-label" for="account-type" data-i18n="accounts_label_type">Account type</label>
            <select id="account-type" name="account-type" required class="form-control">
              <option value="" data-i18n="accounts_select_type">Select type</option>
            </select>
          </div>
          <div class="form-actions">
            <button type="submit" class="accounts-save-btn" data-i18n="accounts_button_save">Save account</button>
            <button type="button" id="cancelAccountEdit" class="accounts-cancel-btn" data-i18n="common_cancel">Cancel</button>
          </div>
          <p id="accountFormMessage" class="account-message"></p>
        </form>
      </section>

      <section id="accountsList" class="accounts-list"><div class="accounts-empty accounts-loading" data-i18n="accounts_loading">Loading accounts...</div></section>
      <p id="accountMessage" class="account-message"></p>
    </div>
  </main>

  <div id="accountsToast" class="accounts-toast hidden" role="status" aria-live="polite">
    <span class="toast-check" aria-hidden="true">
      <svg viewBox="0 0 16 16" fill="none"><polyline points="2 8 6 12 14 4"></polyline></svg>
    </span>
    <span id="accountsToastMessage" data-i18n="accounts_saved">Account saved</span>
  </div>

  <script src="../js/escape-html.js?v=20260410a"></script>
<script src="../js/global.js?v=20260423d"></script>
  <script src="../js/i18n.js?v=20260405c"></script>
  <script src="../js/auth.js?v=20260405c"></script>
  <script src="../js/trial.js?v=20260405c"></script>
  <script src="../js/taxReminders.js?v=20260405c"></script>
  <script src="../js/accounts.js?v=20260405c"></script>
</body>
</html>

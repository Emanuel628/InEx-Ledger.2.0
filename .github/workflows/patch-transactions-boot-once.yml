name: Patch transactions boot once

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/patch-transactions-boot-once.yml'

permissions:
  contents: write

jobs:
  patch-transactions-boot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Patch transactions boot sequence
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const txPath = 'In-Ex-Ledger-API/public/js/transactions.js';
          let source = fs.readFileSync(txPath, 'utf8');

          const startMarker = 'document.addEventListener("DOMContentLoaded", async () => {';
          const endMarker = '\nasync function hydrateTransactionBusinessContext() {';
          const start = source.indexOf(startMarker);
          const end = source.indexOf(endMarker, start);
          if (start === -1 || end === -1) {
            throw new Error('Could not locate transactions DOMContentLoaded boot block.');
          }

          const replacement = `function withTransactionsBootTimeout(label, task, timeoutMs = 12000) {
  let timeoutId = null;
  const timeout = new Promise((_, reject) => {
    timeoutId = window.setTimeout(() => {
      reject(new Error(\`Transactions boot step timed out: \${label}\`));
    }, timeoutMs);
  });

  return Promise.race([
    Promise.resolve().then(task),
    timeout
  ]).finally(() => {
    if (timeoutId) {
      window.clearTimeout(timeoutId);
    }
  });
}

async function runTransactionsBootStep(label, task, options = {}) {
  const timeoutMs = options.timeoutMs || 12000;
  const required = options.required === true;
  try {
    return await withTransactionsBootTimeout(label, task, timeoutMs);
  } catch (error) {
    console.error(\`[Transactions] Boot step failed: \${label}\`, error);
    if (required) {
      throw error;
    }
    return null;
  }
}

document.addEventListener("DOMContentLoaded", async () => {
  try {
    const sessionOk = await runTransactionsBootStep(
      "auth guard",
      () => requireValidSessionOrRedirect(),
      { required: true, timeoutMs: 15000 }
    );

    if (sessionOk !== true) {
      return;
    }
  } catch (error) {
    console.error("[Transactions] Auth guard did not complete", error);
    return;
  }

  try {
    if (typeof enforceTrial === "function") {
      enforceTrial();
    }
  } catch (error) {
    console.warn("[Transactions] Trial enforcement failed", error);
  }

  await runTransactionsBootStep("business context", hydrateTransactionBusinessContext, { timeoutMs: 8000 });

  try {
    initTransactionScopeSelect();
    setupTransactionDrawer();
    initSidebarTypeFilter();
    wireTransactionIntentButtons();
    setupRecurringDrawer();
    wireRecurringForm();
    wireTransactionForm();
  } catch (error) {
    console.error("[Transactions] Initial UI wiring failed", error);
  }

  await Promise.allSettled([
    runTransactionsBootStep("business tax profile", loadBusinessTaxProfile, { timeoutMs: 8000 }),
    runTransactionsBootStep("account options", refreshAccountOptions, { timeoutMs: 8000 }),
    runTransactionsBootStep("category options", refreshCategoryOptions, { timeoutMs: 8000 })
  ]);

  try {
    setTransactionAdvancedDefaults();
  } catch (error) {
    console.warn("[Transactions] Advanced defaults failed", error);
  }

  window.addEventListener("lunaRegionChanged", async () => {
    try {
      await runTransactionsBootStep("region tax profile reload", loadBusinessTaxProfile, { timeoutMs: 8000 });
    } catch (err) {
      console.warn("[Transactions] Tax profile reload on region change failed", err);
    }
    renderTotals();
    setTransactionAdvancedDefaults();
  });

  await runTransactionsBootStep("transactions", loadTransactions, { timeoutMs: 15000 });
  if (transactionsLoading) {
    console.warn("[Transactions] Forcing loading state off after boot timeout");
    setTransactionsLoading(false);
    applyFilters();
    renderTotals();
  }

  // Recurring templates are not required to make the transactions ledger usable.
  // Load them after the main ledger boot so this optional feature cannot block the page.
  void runTransactionsBootStep("recurring templates", loadRecurringTemplates, { timeoutMs: 8000 });

  try {
    wireTransactionSearch();
    wireTransactionCategoryFilter();
    wireTransactionModal();
    window.addEventListener("accountsUpdated", async () => {
      await runTransactionsBootStep("accounts updated options", refreshAccountOptions, { timeoutMs: 8000 });
      renderTransactionsTable();
      renderRecurringAccountOptions();
    });
  } catch (error) {
    console.error("[Transactions] Late UI wiring failed", error);
  }

  try {
    const tier = effectiveTier();
    const cockpit = document.getElementById("tax-cockpit");
    const upsell = document.getElementById("tax-upsell");
    const advancedDetails = document.getElementById("transactionAdvancedDetails");
    const upsellDismissed = isTransactionsUpsellDismissed();
    const hasTransactions = (ledgerState.transactions || []).length > 0;

    if (cockpit) {
      cockpit.hidden = tier === "free" || !hasTransactions;
    }
    if (advancedDetails) {
      advancedDetails.hidden = tier === "free";
      if (tier === "free") {
        advancedDetails.removeAttribute("open");
      }
    }

    if (upsell) {
      const shouldShowUpsell = tier === "free" && hasTransactions && !upsellDismissed;
      upsell.hidden = !shouldShowUpsell;
      const dismissButton = upsell.querySelector(".upsell-dismiss");
      if (dismissButton) {
        dismissButton.addEventListener("click", () => {
          upsell.hidden = true;
          setTransactionsUpsellDismissed();
        });
      }
    }

    const upgradeButton = document.querySelector("[data-upgrade]");
    if (upgradeButton) {
      upgradeButton.addEventListener("click", () => {
        window.location.href = "subscription";
      });
    }
  } catch (error) {
    console.error("[Transactions] Final page state failed", error);
  }
});
`;

          source = source.slice(0, start) + replacement + source.slice(end);
          fs.writeFileSync(txPath, source);

          const htmlPath = 'In-Ex-Ledger-API/public/html/transactions.html';
          let html = fs.readFileSync(htmlPath, 'utf8');
          html = html.replace(/transactions\.js\?v=20260503e/g, 'transactions.js?v=20260506c');
          fs.writeFileSync(htmlPath, html);
          NODE

      - name: Verify patch
        shell: bash
        run: |
          grep -q "withTransactionsBootTimeout" In-Ex-Ledger-API/public/js/transactions.js
          grep -q "transactions.js?v=20260506c" In-Ex-Ledger-API/public/html/transactions.html

      - name: Commit patch and remove workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/patch-transactions-boot-once.yml
          git add -A
          git diff --cached --stat
          git commit -m "Make transactions boot resilient" || exit 0
          git push

name: Phase 7 Guardrails

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  enforce-export-guardrails:
    name: Enforce export guardrails
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: inex_ledger_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d inex_ledger_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL != '' && secrets.DATABASE_URL || 'postgresql://postgres:postgres@127.0.0.1:5432/inex_ledger_ci' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: In-Ex-Ledger-API/package-lock.json

      - name: Debug repo structure
        run: |
          pwd
          ls -la
          ls -la In-Ex-Ledger-API

      - name: Install dependencies
        working-directory: In-Ex-Ledger-API
        run: npm install

      - name: Initialize export grant schema
        working-directory: In-Ex-Ledger-API
        run: |
          node --input-type=module -e "import { pool } from './db.js'; await pool.query('CREATE TABLE IF NOT EXISTS export_grant_jtis (jti UUID PRIMARY KEY, expires_at TIMESTAMPTZ NOT NULL, created_at TIMESTAMPTZ DEFAULT NOW())'); await pool.query('CREATE INDEX IF NOT EXISTS idx_export_grant_jtis_expires ON export_grant_jtis(expires_at)'); await pool.end();"

      - name: Run export grant guard
        working-directory: In-Ex-Ledger-API
        run: npm run test:export-grant

      - name: Run log scan
        working-directory: In-Ex-Ledger-API
        run: npm run log_scan

      - name: Verify redacted export storage
        working-directory: In-Ex-Ledger-API
        run: npm run verify:redacted-storage

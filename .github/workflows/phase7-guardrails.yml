name: Phase 7 Guardrails

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  guardrails:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: inex_ledger_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/inex_ledger_test
      EXPORT_GRANT_SECRET: test-export-secret
      EXPORT_GRANT_TTL_MS: 1000
      JWT_SECRET: test-jwt-secret

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: In-Ex-Ledger-API/package-lock.json

      - name: Debug repo structure
        run: |
          pwd
          ls -la
          ls -la In-Ex-Ledger-API

      - name: Install dependencies
        working-directory: In-Ex-Ledger-API
        run: npm install

      - name: Run database migrations
        working-directory: In-Ex-Ledger-API
        run: node -e "const { initDatabase } = require('./db.js'); initDatabase().then(() => process.exit(0)).catch(err => { console.error(err); process.exit(1); });"

      - name: Run export grant guard
        working-directory: In-Ex-Ledger-API
        run: npm run test:export-grant

      - name: Run log scan
        working-directory: In-Ex-Ledger-API
        run: npm run log_scan

      - name: Verify redacted export storage
        working-directory: In-Ex-Ledger-API
        run: npm run verify:redacted-storage

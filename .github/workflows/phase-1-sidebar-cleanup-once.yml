name: Phase 1 sidebar cleanup once

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/phase-1-sidebar-cleanup-once.yml'

permissions:
  contents: write

jobs:
  cleanup-sidebar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Move Quick Add ownership into global.js
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const globalPath = 'In-Ex-Ledger-API/public/js/global.js';
          let source = fs.readFileSync(globalPath, 'utf8');

          function replaceRequired(from, to, label) {
            if (!source.includes(from)) {
              throw new Error(`Missing expected block: ${label}`);
            }
            source = source.replace(from, to);
          }

          // Analytics is view-only and Settings is system navigation, not Quick Add.
          // Remove them from the source list instead of hiding them with sidecar JS.
          source = source.replace(/\n  \{\n    id: "analytics",\n    label: "Analytics",\n    route: "analytics",\n    group: "Core",\n    actionLabel: "Open analytics",\n    icon: '[\s\S]*?\/svg>'\n  \},/m, '');
          source = source.replace(/\n  \{\n    id: "settings",\n    label: "Settings",\n    route: "settings",\n    group: "System",\n    actionLabel: "Open settings",\n    icon: '[\s\S]*?\/svg>'\n  \}/m, '');
          source = source.replace(/,\n\];/m, '\n];');

          replaceRequired(
            'let dynamicSidebarSaveTimer = null;\n\nconst DYNAMIC_SIDEBAR_FEATURES = [',
            `let dynamicSidebarSaveTimer = null;

const DYNAMIC_SIDEBAR_CORE_FEATURE_IDS = new Set([
  "transactions",
  "receipts",
  "mileage",
  "accounts",
  "categories",
  "exports"
]);
const DYNAMIC_SIDEBAR_BUSINESS_FEATURE_IDS = new Set([
  "customers",
  "invoices",
  "bills",
  "vendors",
  "projects",
  "billable-expenses",
  "billable_expenses"
]);

function normalizeDynamicSidebarTier(value) {
  return String(value || "").trim().toLowerCase();
}

function getDynamicSidebarSubscription() {
  const profileSubscription = window.__LUNA_ME__?.subscription;
  if (profileSubscription && typeof profileSubscription === "object") {
    return profileSubscription;
  }

  try {
    return JSON.parse(localStorage.getItem("lb_subscription") || "null") || null;
  } catch (_) {
    return null;
  }
}

function getDynamicSidebarTier() {
  const subscription = getDynamicSidebarSubscription();
  const candidates = [
    subscription?.effectiveTier,
    subscription?.tier,
    subscription?.plan,
    subscription?.planCode,
    subscription?.plan_code,
    localStorage.getItem("tier")
  ];

  return candidates.map(normalizeDynamicSidebarTier).find(Boolean) || "free";
}

function hasDynamicSidebarBusinessTier() {
  const tier = getDynamicSidebarTier();
  return tier === "business" || tier === "v2" || tier === "business_tier";
}

function getDynamicSidebarAvailableFeatures() {
  const allowBusiness = hasDynamicSidebarBusinessTier();
  return DYNAMIC_SIDEBAR_FEATURES.filter((feature) => {
    if (DYNAMIC_SIDEBAR_BUSINESS_FEATURE_IDS.has(feature.id)) {
      return allowBusiness;
    }
    return DYNAMIC_SIDEBAR_CORE_FEATURE_IDS.has(feature.id);
  });
}

const DYNAMIC_SIDEBAR_FEATURES = [`,
            'dynamic sidebar tier helpers'
          );

          replaceRequired(
            '  const featureMap = new Map(DYNAMIC_SIDEBAR_FEATURES.map((feature) => [feature.id, feature]));\n  let favorites = getDynamicSidebarFavorites(featureMap, window.__LUNA_ME__?.ui_preferences);\n  let draggedFeatureId = "";',
            `  let availableFeatures = getDynamicSidebarAvailableFeatures();
  let featureMap = new Map(availableFeatures.map((feature) => [feature.id, feature]));
  let favorites = getDynamicSidebarFavorites(featureMap, window.__LUNA_ME__?.ui_preferences);
  let draggedFeatureId = "";
  let shouldKeepLibraryOpen = false;`,
            'initDynamicSidebar feature map'
          );

          replaceRequired(
            '    favorites = favorites.filter((id) => featureMap.has(id));\n    const favoriteMarkup = favorites.map((id) => renderDynamicSidebarFavorite(featureMap.get(id))).join("");\n    const groupedLibrary = DYNAMIC_SIDEBAR_FEATURES.reduce((groups, feature) => {',
            `    availableFeatures = getDynamicSidebarAvailableFeatures();
    featureMap = new Map(availableFeatures.map((feature) => [feature.id, feature]));
    favorites = favorites.filter((id) => featureMap.has(id));
    const favoriteMarkup = favorites.map((id) => renderDynamicSidebarFavorite(featureMap.get(id))).join("");
    const groupedLibrary = availableFeatures.reduce((groups, feature) => {`,
            'render available feature list'
          );

          replaceRequired(
            '      <div class="dynamic-sidebar-library" data-sidebar-library hidden>',
            '      <div class="dynamic-sidebar-library" data-sidebar-library${shouldKeepLibraryOpen ? "" : " hidden"}>',
            'library hidden state'
          );

          replaceRequired(
            `    manageButton?.addEventListener("click", () => {
      const nextHidden = !library?.hidden;
      if (library) library.hidden = nextHidden;
      manageButton.setAttribute("aria-expanded", String(!nextHidden));
      manageButton.textContent = nextHidden ? "Add" : "Done";
    });`,
            `    manageButton?.addEventListener("click", () => {
      const nextHidden = !library?.hidden;
      shouldKeepLibraryOpen = !nextHidden;
      if (library) library.hidden = nextHidden;
      manageButton.setAttribute("aria-expanded", String(!nextHidden));
      manageButton.textContent = nextHidden ? "Add" : "Done";
    });`,
            'manage button persistent open state'
          );

          replaceRequired(
            `      const beforeId = event.target.closest("[data-favorite-id]")?.getAttribute("data-favorite-id") || "";
      addOrMoveDynamicSidebarFavorite(draggedFeatureId, beforeId);`,
            `      const beforeId = event.target.closest("[data-favorite-id]")?.getAttribute("data-favorite-id") || "";
      shouldKeepLibraryOpen = true;
      addOrMoveDynamicSidebarFavorite(draggedFeatureId, beforeId);`,
            'drop keeps library open'
          );

          replaceRequired(
            `    sidebar.querySelectorAll("[data-sidebar-add]").forEach((button) => {
      button.addEventListener("click", () => {
        addOrMoveDynamicSidebarFavorite(button.getAttribute("data-sidebar-add") || "");
      });
    });`,
            `    sidebar.querySelectorAll("[data-sidebar-add]").forEach((button) => {
      button.addEventListener("click", () => {
        shouldKeepLibraryOpen = true;
        addOrMoveDynamicSidebarFavorite(button.getAttribute("data-sidebar-add") || "");
      });
    });`,
            'add button keeps library open'
          );

          fs.writeFileSync(globalPath, source);

          const deletedFiles = [
            'In-Ex-Ledger-API/public/js/global-patches.js',
            'In-Ex-Ledger-API/public/js/hide-business-quick-add.js',
            'In-Ex-Ledger-API/public/js/hide-analytics-quick-add.js',
            'In-Ex-Ledger-API/public/js/quick-add-entitlements.js',
            'In-Ex-Ledger-API/public/js/sidebar-multiselect.js'
          ];
          for (const file of deletedFiles) {
            if (fs.existsSync(file)) fs.unlinkSync(file);
          }

          const htmlDir = 'In-Ex-Ledger-API/public/html';
          for (const name of fs.readdirSync(htmlDir)) {
            if (!name.endsWith('.html')) continue;
            const file = path.join(htmlDir, name);
            let html = fs.readFileSync(file, 'utf8');
            const updated = html.replace(/global\.js\?v=[0-9a-z]+/g, 'global.js?v=20260506b');
            if (updated !== html) fs.writeFileSync(file, updated);
          }
          NODE

      - name: Verify Phase 1 cleanup
        shell: bash
        run: |
          test ! -f In-Ex-Ledger-API/public/js/global-patches.js
          test ! -f In-Ex-Ledger-API/public/js/hide-business-quick-add.js
          test ! -f In-Ex-Ledger-API/public/js/hide-analytics-quick-add.js
          test ! -f In-Ex-Ledger-API/public/js/quick-add-entitlements.js
          test ! -f In-Ex-Ledger-API/public/js/sidebar-multiselect.js
          grep -q "getDynamicSidebarAvailableFeatures" In-Ex-Ledger-API/public/js/global.js
          grep -q "hasDynamicSidebarBusinessTier" In-Ex-Ledger-API/public/js/global.js
          grep -q "shouldKeepLibraryOpen" In-Ex-Ledger-API/public/js/global.js
          ! grep -q 'id: "analytics"' In-Ex-Ledger-API/public/js/global.js
          ! grep -q 'id: "settings"' In-Ex-Ledger-API/public/js/global.js
          ! grep -R "global-patches.js\|hide-business-quick-add.js\|hide-analytics-quick-add.js\|quick-add-entitlements.js\|sidebar-multiselect.js" In-Ex-Ledger-API/public || true

      - name: Commit cleanup and remove workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/phase-1-sidebar-cleanup-once.yml
          git add -A
          git diff --cached --stat
          git commit -m "Phase 1: fold Quick Add sidebar logic into global.js" || exit 0
          git push

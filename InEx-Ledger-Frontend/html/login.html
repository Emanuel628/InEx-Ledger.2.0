<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>InEx Ledger - Sign In</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="/css/app.css">
<link rel="stylesheet" href="/css/pages/login.css">
</head>

<body>
  <header class="marketing-header auth-header">
    <a class="brand" href="/html/landing.html" aria-label="InEx Ledger home">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <rect x="2" y="2" width="5" height="5" rx="1.5" fill="currentColor" opacity="1"></rect>
          <rect x="9" y="2" width="5" height="5" rx="1.5" fill="currentColor" opacity=".6"></rect>
          <rect x="2" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".6"></rect>
          <rect x="9" y="9" width="5" height="5" rx="1.5" fill="currentColor" opacity=".35"></rect>
        </svg>
      </span>
      <span class="brand-text">InEx Ledger</span>
    </a>
    <nav>
      <a href="/html/login.html">Sign in</a>
      <a href="/html/subscription.html">Pricing</a>
    </nav>
  </header>

  <div id="canadaTestBanner" class="trial-banner" style="display:none;"></div>

  <main>
    <section class="auth-card">
      <h2>Sign in</h2>

      <form id="loginForm" method="post" class="auth-form">
        <div class="form-field">
          <label for="email" data-i18n="login_email_label">Email address</label>
          <input type="email" id="email" name="email" required autocomplete="email" />
        </div>

        <div class="form-field">
          <label for="password" data-i18n="login_password_label">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" />
        </div>

        <label class="show-password-toggle" data-i18n="login_toggle_show_password">
          <input type="checkbox" id="togglePassword" />
          Show password
        </label>

        <button type="submit" class="auth-submit" data-i18n="login_submit">Sign in</button>
      </form>

      <p id="loginError" class="auth-error" role="alert" aria-live="polite" hidden></p>

      <p class="forgot-password">
        <a href="forgot-password.html" data-i18n="login_forgot_password">
          Forgot password?
        </a>
      </p>

      <p>
        <span data-i18n="login_need_account">Don't have an account?</span>
        <a href="register.html" data-i18n="login_create_account">Create one</a>
      </p>
    </section>
  </main>

  <footer>
    <p>
      <a href="subscription.html" data-i18n="nav_pricing">Pricing</a>
      <a href="privacy.html">Privacy</a>
      <a href="terms.html">Terms</a>
    </p>
    <p>&copy; 2026 InEx Ledger</p>
  </footer>
<script src="../js/global.js"></script>
<script src="../js/i18n.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/login.js"></script>
</body>
</html>

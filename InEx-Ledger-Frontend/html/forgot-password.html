<!DOCTYPE html>
<html lang="en">
<header>
  <p class="site-logo">InEx Ledger</p>
  <nav>
    <a href="/html/login.html">Sign In</a>
    <a href="/html/subscription.html">Pricing</a>
  </nav>
</header>

<body>
  <header><h1>InEx Ledger</h1></header>
  <main>
    <h2>Forgot your password?</h2>
    <form id="forgotPasswordForm" method="post">
      <label for="email">Email address</label><br />
      <input type="email" name="email" id="email" required autocomplete="email" />
      <br /><br />
      <button type="submit">Send reset link</button>
    </form>
    <p id="forgotPasswordStatus" class="form-note" aria-live="polite" hidden></p>
    <p id="forgotPasswordLink" class="form-note link-preview" hidden></p>
  </main>
<script src="../js/global.js"></script>
<script src="../js/forgot-password.js"></script>
</body>
</html>

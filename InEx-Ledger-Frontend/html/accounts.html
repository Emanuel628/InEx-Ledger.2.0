<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>InEx Ledger — Accounts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/css/app.css" />
  <link rel="stylesheet" href="/css/pages/accounts.css" />
</head>

<body>
  <header>
    <h1>InEx Ledger</h1>
    <nav>
      <a data-i18n="nav_transactions" href="transactions.html">Transactions</a> |
      <a data-i18n="nav_accounts" href="accounts.html">Accounts</a> |
      <a data-i18n="nav_categories" href="categories.html">Categories</a> |
      <a data-i18n="nav_receipts" href="receipts.html">Receipts</a> |
      <a href="mileage.html">Mileage</a> |
      <a data-i18n="nav_exports" href="exports.html">Exports</a> |
      <a data-i18n="nav_settings" href="settings.html">Settings</a>
    </nav>
  </header>

  <div id="trialBanner" class="trial-banner"></div>

  <main>
    <div class="app-page accounts-page">
      <section class="panel surface-card">
        <div class="accounts-header">
          <div class="accounts-header-left">
            <h2 data-i18n="accounts_title">Accounts</h2>
            <p data-i18n="accounts_description">
              Add your business bank accounts, credit cards, and cash so InEx Ledger can track balances, link transactions, and generate accurate reports.
            </p>
          </div>
          <div class="accounts-header-right">
            <button
              id="showAccountForm"
              type="button"
              class="btn-primary-indigo"
              data-i18n="accounts_add"
            >
              Add account
            </button>
          </div>
        </div>

        <div id="accountFormContainer">
          <form id="accountForm">
            <div class="form-field">
              <label for="account-name" data-i18n="accounts_label_name">Account name</label><br />
              <input type="text" id="account-name" name="account-name" required />
            </div>

            <div class="form-field">
              <label for="account-type" data-i18n="accounts_label_type">Account type</label><br />
              <select id="account-type" name="account-type" required>
                <option value="">Select type</option>
              </select>
            </div>

            <div class="form-actions">
              <button type="submit" class="btn-primary-indigo" data-i18n="accounts_button_save">Save account</button>
              <button type="button" id="cancelAccountEdit" class="btn-ghost">Cancel</button>
            </div>
          </form>
          <p id="accountFormMessage" class="error-text"></p>
        </div>
      </section>

      <section class="panel surface-card">
        <div class="surface-card-content">
          <div id="accountsList"></div>
          <p id="accountMessage" class="error-text"></p>
        </div>
      </section>
    </div>
  </main>

  <footer>
    <p>
      <a href="subscription.html">Pricing</a>
      <a href="privacy.html">Privacy</a>
      <a href="terms.html">Terms</a>
    </p>
    <p>&copy; InEx Ledger</p>
  </footer>

  <script src="../js/global.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/trial.js"></script>
  <script src="../js/accounts.js"></script>
</body>
</html>
